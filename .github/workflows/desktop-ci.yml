name: Desktop CI

on:
  pull_request:
  push:
    branches: [main, 'feat/**', 'feature/**']

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run aggregate desktop checks
        run: npm run ci:desktop

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust workspace
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Check Windows portable toolchain
        if: runner.os == 'Windows'
        run: npm run tauri:check:portable

      - name: Install Chromium dependencies on Linux
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium on macOS and Windows
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Run real Chromium browser tests
        run: npm run test:browser:e2e
